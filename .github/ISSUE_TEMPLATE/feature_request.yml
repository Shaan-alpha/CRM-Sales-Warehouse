name: 🚀 Feature Request
description: Suggest a new dbt model, Airflow sensor, or Power BI visual
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature for CRM + Sales Warehouse! We love expanding our data models and dashboard capabilities.

  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is.
      placeholder: E.g., We currently track deal win rate, but don't track sales cycle duration (days from stage 1 to won)...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
      placeholder: E.g., Add a datediff calculation in fact_sales_pipeline.sql and build a new histogram visual in the Power BI .pbix report.
    validations:
      required: true

  - type: checkboxes
    id: willingness
    attributes:
      label: Willingness to Contribute
      options:
        - label: I am interested in contributing a pull request to implement this feature!
