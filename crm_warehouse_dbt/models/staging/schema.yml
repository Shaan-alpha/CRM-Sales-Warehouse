version: 2

models:
  - name: stg_accounts
    description: Cleaned staging layer for CRM account data

    columns:
      - name: account
        description: Unique customer account name
        tests:
          - unique
          - not_null

      - name: revenue
        description: Annual account revenue
        tests:
          - not_null

  - name: dim_accounts
    description: Analytics-ready dimension table for customer accounts

    columns:
      - name: account
        description: Customer account identifier

      - name: sector
        description: Industry sector of the account

      - name: revenue
        description: Annual revenue generated by the account

      - name: employees
        description: Employee count for the account

      - name: account_tier
        description: Business tier classification based on revenue